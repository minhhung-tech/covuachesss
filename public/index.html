<!DOCTYPE html>
<html>
<head>
    <title>Chess Bot Game</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div id="board" style="width: 400px; margin: auto;"></div>
    <div style="text-align: center; margin-top: 20px;">
        <input id="roomInput" placeholder="Nhập mã phòng...">
        <button onclick="joinRoom()">Tham gia</button>
        <select id="level">
            <option value="1">Level 1 (Dễ)</option>
            <option value="5">Level 5 (Khó)</option>
        </select>
    </div>
    <script src="board.js"></script>
</body>
</html>
